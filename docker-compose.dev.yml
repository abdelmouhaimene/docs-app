version: '3.8'

services:
  # MongoDB 
  mongodb:
    image: mongo:7.0
    container_name: mca-docs-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: mca_docs_dev
    volumes:
      - mongodb_data_dev:/data/db
      - mongodb_config_dev:/data/configdb
    networks:
      - mca-docs-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mca-docs-api-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/mca_docs_dev?authSource=admin
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_EXPIRATION=7d
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./libs:/app/libs
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mca-docs-network
    command: npm run start:dev --workspace=apps/api

  # Next.js Client
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: mca-docs-client-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
    volumes:
      - ./apps/client:/app/apps/client
      - /app/node_modules
      - /app/apps/client/node_modules
      - /app/apps/client/.next
    depends_on:
      - api
    networks:
      - mca-docs-network
    command: npm run dev --workspace=apps/client

  # Mongo Express (Database Admin UI)
  mongo-express:
    image: mongo-express:latest
    container_name: mca-docs-mongo-express-dev
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - mca-docs-network

volumes:
  mongodb_data_dev:
    driver: local
  mongodb_config_dev:
    driver: local

networks:
  mca-docs-network:
    driver: bridge
