version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:4.4
    container_name: mca-docs-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-mca_docs}
    volumes:
      - mongodb_data_prod:/data/db
      - mongodb_config_prod:/data/configdb
    networks:
      - mca-docs-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/27017"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: mongod --auth

  # NestJS API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    container_name: mca-docs-api-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-mca_docs}?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
      - UPLOAD_PATH=/app
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - API_PREFIX=${API_PREFIX:-/api/v1}
    volumes:
      - ./documents:/app/documents
      - api_logs_prod:/app/logs
    depends_on:
      - mongodb
    networks:
      - mca-docs-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Client
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: mca-docs-client-prod
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4001/api/v1}
    depends_on:
      - api
    networks:
      - mca-docs-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mca-docs-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - api
    networks:
      - mca-docs-network

volumes:
  mongodb_data_prod:
    driver: local
  mongodb_config_prod:
    driver: local
  api_logs_prod:
    driver: local

networks:
  mca-docs-network:
    driver: bridge
